{% extends "base.html" %}
{% block title %}{{ 'Modifier' if equipement else 'Ajouter' }} Equipement - FC VAINQUEUR{% endblock %}
{% block page_title %}<i class="fas fa-edit me-2"></i> {{ "Modifier l'equipement" if equipement else "Ajouter un equipement" }}{% endblock %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-lg-6">
        <div class="card border-0 shadow-sm">
            <div class="card-body p-4">
                <form method="POST">
                    <div class="row g-3">
                        <div class="col-md-8">
                            <label class="form-label fw-bold">Nom *</label>
                            <input type="text" name="nom" class="form-control" required
                                   value="{{ data.get('nom', equipement.nom if equipement else '') }}">
                        </div>
                        <div class="col-md-4">
                            <label class="form-label">Categorie</label>
                            <input type="text" name="categorie" class="form-control"
                                   value="{{ data.get('categorie', equipement.categorie if equipement else '') }}">
                        </div>
                        <div class="col-12">
                            <label class="form-label">Description</label>
                            <textarea name="description" class="form-control" rows="2">{{ data.get('description', equipement.description if equipement else '') }}</textarea>
                        </div>
                        <div class="col-md-4">
                            <label class="form-label">Quantite</label>
                            <input type="number" name="quantite" class="form-control"
                                   value="{{ data.get('quantite', equipement.quantite if equipement else 1) }}">
                        </div>
                        <div class="col-md-4">
                            <label class="form-label">Prix (FC)</label>
                            <input type="number" name="prix" class="form-control" step="0.01"
                                   value="{{ data.get('prix', equipement.prix if equipement else 0) }}">
                        </div>
                        <div class="col-md-4">
                            <label class="form-label">Etat</label>
                            <select name="etat" class="form-select">
                                {% set current_etat = data.get('etat', equipement.etat if equipement else 'Neuf') %}
                                <option value="Neuf" {{ 'selected' if current_etat == 'Neuf' }}>Neuf</option>
                                <option value="Bon" {{ 'selected' if current_etat == 'Bon' }}>Bon</option>
                                <option value="Use" {{ 'selected' if current_etat == 'Use' }}>Use</option>
                                <option value="Mauvais" {{ 'selected' if current_etat == 'Mauvais' }}>Mauvais</option>
                            </select>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label">Date d'achat</label>
                            <input type="date" name="date_achat" class="form-control"
                                   value="{{ data.get('date_achat', equipement.date_achat if equipement else '') }}">
                        </div>
                        <div class="col-md-6">
                            <label class="form-label">Fournisseur</label>
                            <input type="text" name="fournisseur" class="form-control"
                                   value="{{ data.get('fournisseur', equipement.fournisseur if equipement else '') }}">
                        </div>
                        <div class="col-12">
                            <label class="form-label">Observations</label>
                            <textarea name="observations" class="form-control" rows="2">{{ data.get('observations', equipement.observations if equipement else '') }}</textarea>
                        </div>
                    </div>
                    <div class="d-flex gap-2 mt-4">
                        <button type="submit" class="btn btn-success flex-fill">
                            <i class="fas fa-save me-1"></i> Enregistrer
                        </button>
                        <a href="{{ url_for('equipements.index') }}" class="btn btn-secondary">
                            <i class="fas fa-times me-1"></i> Annuler
                        </a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
