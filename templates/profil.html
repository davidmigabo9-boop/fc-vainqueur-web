<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mon Profil - FC VAINQUEUR</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">
    <link href="{{ url_for('static', filename='css/style.css') }}" rel="stylesheet">
</head>
<body class="bg-dark d-flex align-items-center justify-content-center min-vh-100">
    <div class="card border-0 shadow" style="max-width:600px; width:100%;">
        <div class="card-header bg-success text-white text-center py-3">
            <h5 class="fw-bold mb-0"><i class="fas fa-id-card me-1"></i> Completez votre profil</h5>
            <small>Veuillez remplir vos informations pour acceder a l'application.</small>
        </div>
        <div class="card-body p-4">
            <form method="POST" enctype="multipart/form-data">
                <div class="row g-3">
                    <div class="col-md-6">
                        <label class="form-label">Nom *</label>
                        <input type="text" name="nom" class="form-control" required placeholder="Votre nom">
                    </div>
                    <div class="col-md-6">
                        <label class="form-label">Post-nom</label>
                        <input type="text" name="postnom" class="form-control" placeholder="Post-nom">
                    </div>
                    <div class="col-md-6">
                        <label class="form-label">Prenom *</label>
                        <input type="text" name="prenom" class="form-control" required placeholder="Prenom">
                    </div>
                    <div class="col-md-6">
                        <label class="form-label">Numero</label>
                        <input type="number" name="numero" class="form-control" placeholder="NumÃ©ro de maillot">
                    </div>
                    <div class="col-md-6">
                        <label class="form-label">Poste</label>
                        <select name="poste" class="form-select">
                            <option value="">-- Choisir --</option>
                            <option value="Gardien">Gardien</option>
                            <option value="Defenseur">Defenseur</option>
                            <option value="Milieu">Milieu</option>
                            <option value="Attaquant">Attaquant</option>
                            <option value="Ailier">Ailier</option>
                        </select>
                    </div>
                    <div class="col-md-6">
                        <label class="form-label">Date de naissance</label>
                        <input type="date" name="date_naissance" class="form-control">
                    </div>
                    <div class="col-md-6">
                        <label class="form-label">Telephone</label>
                        <input type="text" name="telephone" class="form-control" placeholder="+243 ...">
                    </div>
                    <div class="col-md-6">
                        <label class="form-label">Photo</label>
                        <input type="file" name="photo" class="form-control" accept="image/*">
                    </div>
                    <div class="col-12">
                        <label class="form-label">Adresse</label>
                        <input type="text" name="adresse" class="form-control" placeholder="Votre adresse">
                    </div>
                </div>
                <div class="d-grid mt-4">
                    <button type="submit" class="btn btn-success btn-lg">
                        <i class="fas fa-save me-1"></i> Enregistrer mon profil
                    </button>
                </div>
            </form>
        </div>
    </div>
</body>
</html>
